on:
  pull_request:
    paths: &paths
      - 'src/**'
      - '.github/workflows/static.yml'
      - 'psalm.xml'
      - 'composer.json'

  push:
    branches: ['master']
    paths: *paths

name: static analysis

jobs:
  psalm:
    uses: yiisoft/actions/.github/workflows/psalm.yml@master
    with:
      php: >-
        ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
